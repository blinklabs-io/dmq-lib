name: nilaway
on:
  push:
    tags:
      - v*
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  nilaway:
    name: nilaway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 https://github.com/actions/checkout/releases/tag/v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0 https://github.com/actions/setup-go/releases/tag/v6.4.0
        with:
          go-version: 1.26.x
          cache: false
      - name: install nilaway
        run: GOTOOLCHAIN=local go install go.uber.org/nilaway/cmd/nilaway@v0.0.0-20260515015210-fd187751154f
      - name: run nilaway
        run: nilaway -include-pkgs=github.com/blinklabs-io/dmq-lib ./...
