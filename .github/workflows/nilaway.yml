name: nilaway
on:
  push:
    tags:
      - v*
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  nilaway:
    name: nilaway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1 https://github.com/actions/checkout/releases/tag/v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0 https://github.com/actions/setup-go/releases/tag/v7.0.0
        with:
          go-version: 1.26.x
          cache: false
      - name: install nilaway
        run: GOTOOLCHAIN=local go install go.uber.org/nilaway/cmd/nilaway@v0.0.0-20260515015210-fd187751154f
      - name: run nilaway
        run: nilaway -include-pkgs=github.com/blinklabs-io/dmq-lib ./...
